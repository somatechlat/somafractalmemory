[pytest]
minversion = 6.0
addopts = -ra -q
testpaths = tests
markers =
	unit: tests that are self-contained and do not require external services
	integration: tests requiring real infrastructure services (Postgres, Redis, Milvus)
	e2e: end-to-end tests that run against a deployed or live system
filterwarnings =
	# Enforce a zero-warning policy for project code
	error
	# Silence third-party deprecation warnings we cannot address immediately
	ignore::DeprecationWarning:testcontainers.*
	ignore:.*@wait_container_is_ready decorator is deprecated.*:DeprecationWarning
	ignore::pydantic.warnings.PydanticDeprecatedSince20
	ignore:.*asyncio_default_fixture_loop_scope.*:pytest.PytestDeprecationWarning
	ignore:.*pkg_resources is deprecated.*:UserWarning
	ignore:.*Remove.*format_exc_info.*:UserWarning
	ignore:.*Deprecated call to.*pkg_resources.declare_namespace.*:DeprecationWarning
	# Host-side pymilvus/environs/marshmallow deprecation chain (clean in container)
	ignore:.*__version_info__.*:DeprecationWarning
